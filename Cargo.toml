[package]
name = "polars_bio"
version = "0.31.0"
edition = "2021"

[lib]
name = "polars_bio"
crate-type= ["cdylib"]




[dependencies]
datafusion-python = { version = "53.0.0", default-features = false }
pyo3 = { version = "0.28.3", features = ["extension-module", "abi3"] }
pyo3-log = "0.13.3"


datafusion = { version = "53.1.0", default-features = false, features = ["nested_expressions", "crypto_expressions", "datetime_expressions", "encoding_expressions", "regex_expressions", "string_expressions", "unicode_expressions", "parquet", "recursive_protection", "sql"] }
arrow = "58.3.0"
arrow-schema = "58.3.0"
arrow-array = { version = "58.3.0", features = ["ffi"] }
tokio = {version = "1.42.0", features = ["full", "tracing"]}
log = "0.4.22"
tracing = { version = "0.1.41", features = ["log"] }
futures-util = "0.3.31"

datafusion-bio-format-vcf = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-core = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-gff = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-fastq = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-bam = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-cram = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-bed = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-fasta = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-pairs = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }
datafusion-bio-format-gtf = { git = "https://github.com/biodatageeks/datafusion-bio-formats.git", rev = "b9b76948dfc9b18a663cb2bf546a99514756056d" }

datafusion-bio-function-ranges = { git = "https://github.com/biodatageeks/datafusion-bio-functions.git", rev = "8e7fd4cac03c69c23ae984bd81d02d3b72cd7890" }
datafusion-bio-function-pileup = { git = "https://github.com/biodatageeks/datafusion-bio-functions.git", rev = "8e7fd4cac03c69c23ae984bd81d02d3b72cd7890", default-features = false }

async-trait = "0.1.86"
futures = "0.3.31"
rand = "0.8.5"
serde_json = "1.0"

[patch.crates-io]
datafusion-python = { path = "vendor/datafusion-python-53.0.0" }
datafusion-python-util = { path = "vendor/datafusion-python-util-53.0.0" }
