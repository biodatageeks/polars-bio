name: 💡 Feature request
description: Suggest a new feature, format, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve polars-bio! Please describe the problem you're trying
        to solve, not only the solution you have in mind — it helps us find the best fit.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preliminary checks
      options:
        - label: I searched [existing issues](https://github.com/biodatageeks/polars-bio/issues) and this has not been requested yet.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what is currently missing or painful?
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you'd like. Include a sketch of the API if you have one in mind.
      render: python
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references to other tools/formats, benchmarks, or anything else relevant.
    validations:
      required: false
